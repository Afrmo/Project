resources:
  jobs:
    Earthquake:
      name: Earthquake
      tasks:
        - task_key: Ingestion_bronze
          notebook_task:
            notebook_path: ../src/notebooks/Ingestion_bronze.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
          environment_key: Default
        - task_key: bronze_silver_earthquake
          depends_on:
            - task_key: Ingestion_bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_bronze_sliver.id}
            full_refresh: false
        - task_key: Earthquake_dashboard
          depends_on:
            - task_key: bronze_silver_earthquake
          dashboard_task:
            subscription: {}
            warehouse_id: 0592f2a528f5fc45
            dashboard_id: ${resources.dashboards.earthquake_monitor.id}
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
