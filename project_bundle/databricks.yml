# This is a Databricks asset bundle definition for project_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: project_bundle
  uuid: 8a129397-4d3f-40a4-94e0-7ccfc53b2153

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  warehouse_id:
    description: WarehouseID

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-9aaac8cb-a720.cloud.databricks.com
    variables:
      catalog: dev
      schema: dev
      warehouse_id: 0592f2a528f5fc45
  prod:
    mode: production
    workspace:
      host: https://dbc-9aaac8cb-a720.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/afridmohammed251@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/afridmohammed251@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dev
      schema: prod
      warehouse_id: 0592f2a528f5fc45
    permissions:
      - user_name: afridmohammed251@gmail.com
        level: CAN_MANAGE
